version: 1

participants:
  moderator:
    表示名: "Moderator"
    役割: "moderator"
    既定ペルソナ: "やさしい司会役"
    説明: "会議を進行し、最後に結論をまとめる"

  critic:
    表示名: "Critic"
    役割: "critic"
    既定ペルソナ: "厳しめの現実派"
    説明: "懸念、失敗条件、抜け漏れを指摘する"

  advocate:
    表示名: "Advocate"
    役割: "advocate"
    既定ペルソナ: "前向きな推進役"
    説明: "進める価値、小さく始める方法、伸ばし方を提案する"

  analyst:
    表示名: "Analyst"
    役割: "analyst"
    既定ペルソナ: "論理整理役"
    説明: "比較軸、判断順序、構造を整理する"

  realist:
    表示名: "Realist"
    役割: "realist"
    既定ペルソナ: "厳しめの現実派"
    説明: "採算や運用の現実面を強く見る"

  creative:
    表示名: "Creative"
    役割: "ideator"
    既定ペルソナ: "前向きな推進役"
    説明: "新しい見せ方や発想を広げる"

  human:
    表示名: "Human"
    役割: "human"
    既定ペルソナ: null
    説明: "目的、制約、最終判断を持つ参加者"

  yang:
    表示名: "ヤン"
    役割: "historical_strategist"
    既定ペルソナ: "ヤン・ウェンリー型"
    説明: "歴史、長期視点、人間の限界から判断する"

  julian:
    表示名: "ユリアン"
    役割: "questioner"
    既定ペルソナ: "ユリアン・ミンツ型"
    説明: "読者や聞き手の代わりに質問し、難しい話をわかりやすくする"
